<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dziennik Roślinny – Dodaj</title>
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#2e7d32" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="kamera.css" />
  </head>
  <body>
    <nav class="navbar navbar-dark bg-success">
      <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="index.html"
          >🌿 Dziennik Roślinny</a
        >
        <div class="d-flex gap-2">
          <a href="index.html" class="btn btn-light btn-sm">📋 Lista</a>
          <a href="map.html" class="btn btn-light btn-sm">🗺️ Mapa</a>
        </div>
      </div>
    </nav>

    <main class="container py-4">
      <h2 class="mb-4">📷 Nowa obserwacja</h2>

      <!-- KAMERA -->
      <div class="card mb-3 shadow-sm">
        <div class="card-body text-center">
          <video
            id="video"
            autoplay
            playsinline
            class="camera-preview mb-2 d-none"
          ></video>
          <canvas id="canvas" class="d-none"></canvas>
          <img
            id="preview"
            class="captured-photo d-none mb-2"
            alt="Zdjęcie rośliny"
          />

          <div class="d-flex gap-2 justify-content-center flex-wrap mt-2">
            <button
              id="btn-start-cam"
              onclick="startCamera()"
              class="btn btn-success"
            >
              ▶️ Uruchom kamerę
            </button>
            <button
              id="btn-capture"
              onclick="capture()"
              class="btn btn-primary d-none"
            >
              📸 Zrób zdjęcie
            </button>
            <button
              id="btn-retake"
              onclick="retake()"
              class="btn btn-secondary d-none"
            >
              🔄 Ponów
            </button>
            <label class="btn btn-outline-secondary mb-0">
              🖼️ Z galerii
              <input
                type="file"
                accept="image/*"
                id="file-input"
                class="d-none"
                onchange="loadFromFile(this)"
              />
            </label>
          </div>
        </div>
      </div>

      <!-- GPS -->
      <div class="card mb-3 shadow-sm">
        <div class="card-body">
          <h5 class="card-title">📍 Lokalizacja GPS</h5>
          <p id="gps-status" class="small text-muted">
            Naciśnij przycisk, aby pobrać lokalizację.
          </p>
          <button
            onclick="getLocation()"
            class="btn btn-outline-success btn-sm"
          >
            🌐 Pobierz GPS
          </button>
          <input type="hidden" id="lat" />
          <input type="hidden" id="lng" />
        </div>
      </div>

      <!-- OPIS -->
      <div class="card mb-3 shadow-sm">
        <div class="card-body">
          <h5 class="card-title">📝 Dane rośliny</h5>
          <div class="mb-3">
            <label for="plant-name" class="form-label">Nazwa rośliny</label>
            <input
              type="text"
              id="plant-name"
              class="form-control"
              placeholder="np. Fiołek alpejski"
            />
          </div>
          <div>
            <label for="plant-notes" class="form-label">Notatki</label>
            <textarea
              id="plant-notes"
              class="form-control"
              rows="2"
              placeholder="Opis, stan rośliny…"
            ></textarea>
          </div>
        </div>
      </div>

      <!-- AKCJE -->
      <div class="d-grid gap-2">
        <button onclick="saveEntry()" class="btn btn-success btn-lg">
          💾 Zapisz obserwację
        </button>
        <button onclick="shareEntry()" class="btn btn-outline-primary btn-lg">
          📤 Udostępnij
        </button>
      </div>
      <div id="save-msg" class="alert alert-success mt-3 d-none">
        Zapisano! <a href="index.html">Wróć do listy →</a>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
    <script>
      let stream = null;
      let photoDataUrl = null;
      let gpsCoords = null;

      async function startCamera() {
        try {
          stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment' },
            audio: false,
          });
          const video = document.getElementById('video');
          video.srcObject = stream;
          video.classList.remove('d-none');
          document.getElementById('btn-start-cam').classList.add('d-none');
          document.getElementById('btn-capture').classList.remove('d-none');
        } catch (err) {
          alert('Nie można uruchomić kamery: ' + err.message);
        }
      }

      function capture() {
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        photoDataUrl = canvas.toDataURL('image/jpeg', 0.75);

        const preview = document.getElementById('preview');
        preview.src = photoDataUrl;
        preview.classList.remove('d-none');
        video.classList.add('d-none');
        document.getElementById('btn-capture').classList.add('d-none');
        document.getElementById('btn-retake').classList.remove('d-none');

        if (stream) stream.getTracks().forEach((t) => t.stop());
      }

      function retake() {
        photoDataUrl = null;
        document.getElementById('preview').classList.add('d-none');
        document.getElementById('btn-retake').classList.add('d-none');
        document.getElementById('btn-start-cam').classList.remove('d-none');
      }

      function loadFromFile(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
          photoDataUrl = e.target.result;
          const preview = document.getElementById('preview');
          preview.src = photoDataUrl;
          preview.classList.remove('d-none');
        };
        reader.readAsDataURL(file);
      }

      function getLocation() {
        const status = document.getElementById('gps-status');
        if (!navigator.geolocation) {
          status.textContent = 'Geolokalizacja niedostępna.';
          return;
        }
        status.textContent = '⏳ Pobieranie lokalizacji…';
        navigator.geolocation.getCurrentPosition(
          (pos) => {
            gpsCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
            document.getElementById('lat').value = gpsCoords.lat;
            document.getElementById('lng').value = gpsCoords.lng;
            status.innerHTML = `✅ <strong>${gpsCoords.lat.toFixed(5)}, ${gpsCoords.lng.toFixed(5)}</strong>`;
          },
          (err) => {
            status.textContent = '❌ Błąd GPS: ' + err.message;
          },
        );
      }

      function buildEntry() {
        return {
          name: document.getElementById('plant-name').value.trim() || 'Roślina',
          notes: document.getElementById('plant-notes').value.trim(),
          photo: photoDataUrl,
          lat: gpsCoords ? gpsCoords.lat : null,
          lng: gpsCoords ? gpsCoords.lng : null,
        };
      }

      function saveEntry() {
        PlantDiary.save(buildEntry());
        document.getElementById('save-msg').classList.remove('d-none');
      }

      async function shareEntry() {
        const entry = buildEntry();
        const text = `🌿 ${entry.name}\n${entry.notes}\n📍 ${entry.lat ? entry.lat.toFixed(5) + ', ' + entry.lng.toFixed(5) : 'brak GPS'}`;

        if (!navigator.share) {
          alert('Web Share API niedostępne w tej przeglądarce.');
          return;
        }

        const shareData = { title: entry.name, text };

        if (photoDataUrl && navigator.canShare) {
          const res = await fetch(photoDataUrl);
          const blob = await res.blob();
          const file = new File([blob], 'plant.jpg', { type: 'image/jpeg' });
          if (navigator.canShare({ files: [file] })) shareData.files = [file];
        }

        navigator.share(shareData).catch(console.error);
      }
    </script>
  </body>
</html>

<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PApprotka - Mapa</title>
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#2e7d32" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Iosevka+Charon:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="map.css" />    
  </head>
  <body>
    <nav class="navbar navbar-dark bg-success flex-shrink-0">
      <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="index.html">P<span id='app'>App</span>rotka</a>
        <div class="d-flex gap-2">
          <a href="../index.html" class="btn btn-light btn-sm">Lista</a>
          <a href="../kamera/kamera.html" class="btn btn-light btn-sm">Dodaj</a>
        </div>
      </div>
    </nav>

    <div id="map"></div>

    <div id="no-gps-msg" class="container py-5 d-none">
      <div class="alert alert-warning text-center">
        Brak obserwacji z lokalizacją GPS.<br />
        <a href="kamera.html" class="btn btn-success mt-2">Dodaj pierwszą obserwację</a>
      </div>
    </div>

    <footer class="footer footer-class bg-success">
      <div class="container row foot">
          <div class="col-4">
              <a href="index.html" class="btn btn-sm button">🏡 Home</a>
          </div>
          <div class="col-4">
              <a href="kamera.html" class="btn btn-sm button">📷 Dodaj</a>
          </div>
          <div class="col-4">
              <a href="map.html" class="btn btn-sm button">🗺️ Mapa</a>
          </div>
      </div>
  </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
    <script>
      const plants = PlantDiary.getAll().filter((p) => p.lat && p.lng);
      const urlId = new URLSearchParams(location.search).get('id');

      if (!plants.length) {
        document.getElementById('map').classList.add('d-none');
        document.getElementById('no-gps-msg').classList.remove('d-none');
      } else {
        const map = L.map('map');

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          attribution:
            '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
          maxZoom: 19,
        }).addTo(map);

        const plantIcon = L.divIcon({
          html: '<span style="font-size:2rem;line-height:1">🌿</span>',
          className: '',
          iconSize: [36, 36],
          iconAnchor: [18, 36],
          popupAnchor: [0, -36],
        });

        const markers = plants.map((p) => {
          const marker = L.marker([p.lat, p.lng], { icon: plantIcon }).addTo(
            map,
          );
          marker.bindPopup(`
        <div style="min-width:150px">
          ${p.photo ? `<img src="${p.photo}" style="width:100%;border-radius:6px;margin-bottom:6px;max-height:140px;object-fit:cover">` : ''}
          <strong>${p.name}</strong><br>
          <small class="text-muted">${new Date(p.id).toLocaleString('pl-PL')}</small>
          ${p.notes ? `<p style="margin:6px 0 0;font-size:0.85rem">${p.notes}</p>` : ''}
        </div>`);
          if (String(p.id) === urlId) marker.openPopup();
          return marker;
        });

        const group = L.featureGroup(markers);
        if (urlId) {
          const target = plants.find((p) => String(p.id) === urlId);
          if (target) map.setView([target.lat, target.lng], 15);
          else map.fitBounds(group.getBounds(), { padding: [40, 40] });
        } else {
          map.fitBounds(group.getBounds(), { padding: [40, 40] });
        }
      }
    </script>
  </body>
</html>

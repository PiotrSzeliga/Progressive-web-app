<!doctype html>
<html lang="pl">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PAppRotka</title>
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#2e7d32" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    />
    <link rel="stylesheet" href="index.css" />
  </head>

  <body>
    <nav>
        <div class="container-fluid">
            <a class="navbar-brand fw-bold home" href="/index/index.html">P<span id="app">App</span>Rotka</a>
        </div>
    </nav>
    <main class="container py-4">
          <h2 class="mb-3">Moje obserwacje</h2>
          <div id="plant-list" class="row g-3"></div>
          <p id="empty-msg" class="text-muted text-center mt-5 d-none">
            Brak obserwacji. Dodaj pierwszą roślinę! 
          </p>
    </main>
    <footer class="footer">
        <div class="container row foot">
            <div class="col-4">
                <a href="/index/index.css" class="btn btn-sm button">🏡 Home</a>
            </div>
            <div class="col-4">
                <a href="/kamera/kamera.html" class="btn btn-sm button">📷 Dodaj</a>
            </div>
            <div class="col-4">
                <a href="/map/map.css" class="btn btn-sm button">🗺️ Mapa</a>
            </div>
        </div>
    </footer>

  
      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
      <script src="app.js"></script>
      <script>
        function renderList() {
          const list = PlantDiary.getAll();
          const container = document.getElementById('plant-list');
          const emptyMsg = document.getElementById('empty-msg');
          container.innerHTML = '';
  
          if (!list.length) {
            emptyMsg.classList.remove('d-none');
            return;
          }
          emptyMsg.classList.add('d-none');
  
          list
            .slice()
            .reverse()
            .forEach((p) => {
              const col = document.createElement('div');
              col.className = 'col-12 col-sm-6 col-md-4';
              col.innerHTML = `
          <div class="card h-100 shadow-sm observation-card">
            ${p.photo ? `<img src="${p.photo}" class="card-img-top observation-photo" alt="${p.name}">` : ''}
            <div class="card-body">
              <h5 class="card-title">${p.name || 'Roślina'}</h5>
              <p class="card-text text-muted small">${p.notes || ''}</p>
              <p class="card-text small">
                📍 ${p.lat ? p.lat.toFixed(5) + ', ' + p.lng.toFixed(5) : 'brak GPS'}
              </p>
              <p class="card-text small text-secondary">
                ${new Date(p.id).toLocaleString('pl-PL')}
              </p>
            </div>
            <div class="card-footer d-flex gap-2">
              <a href="map.html?id=${p.id}" class="btn btn-sm btn-outline-success flex-grow-1">🗺️ Pokaż na mapie</a>
              <button onclick="deleteEntry(${p.id})" class="btn btn-sm btn-outline-danger">🗑️</button>
            </div>
          </div>`;
              container.appendChild(col);
            });
        }
  
        function deleteEntry(id) {
          if (confirm('Usunąć tę obserwację?')) {
            PlantDiary.delete(id);
            renderList();
          }
        }
  
        renderList();
      </script>
  </body>
